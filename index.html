<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認字英雄傳 v1.7 - 進度實時保存版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #f1c40f; --success: #27ae60; --fail: #e74c3c; --bg: #f5f6fa; }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 月曆樣式 */
        #calendar-view { padding: 15px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-box { background: white; border-radius: 10px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #ddd; font-weight: bold; cursor: pointer; }
        .day-box.today { border: 3px solid var(--accent); background: #fffde7; }
        .day-box.completed::after { content: '✅'; position: absolute; bottom: 3px; right: 3px; font-size: 10px; }
        .day-box.locked { background: #eee !important; color: #bbb !important; cursor: not-allowed !important; opacity: 0.5; border: none; }
        .day-box.future { opacity: 0.3; pointer-events: none; }

        .admin-section { margin-top: 30px; padding: 15px; background: #fff; border-radius: 12px; border: 1px dashed #ccc; }
        .admin-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-small { padding: 8px; font-size: 0.8rem; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: #fff; }

        /* 挑戰介面 */
        #challenge-view { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; background: white; text-align: center; position: relative; }
        .top-controls { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; }
        .control-btn { border: none; background: #f1f2f6; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: #57606f; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        #word-display { font-size: clamp(3.5rem, 18vw, 7rem); font-weight: 900; color: var(--primary); min-height: 1.2em; letter-spacing: 5px; transition: 0.3s; }
        #word-display.correct { color: var(--success); transform: scale(1.15); }
        
        .mode-indicator { padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        .mode-listen { background: #dff9fb; color: #130f40; border: 1px solid #7ed6df; }
        .mode-read { background: #fff5f5; color: #eb4d4b; border: 1px solid #ff7979; }

        #voice-mic { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 4px solid #eee; color: #ccc; transition: 0.3s; }
        .active-mic { border-color: var(--fail) !important; color: var(--fail) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); } 100% { box-shadow: 0 0 0 20px rgba(231,76,60,0); } }

        .btn-main { width: 85%; max-width: 300px; padding: 16px; border-radius: 50px; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 5px 0; }
        .btn-challenge { background: var(--fail); color: white; }
        .btn-return { background: var(--primary); color: white; display: none; }
        .btn-pause { background: #ced4da; color: #495057; width: 55px; height: 55px; border-radius: 50%; border: none; font-size: 1.2rem; transition: 0.3s; }
        .progress-text { font-size: 1rem; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>

<div id="calendar-view">
    <div class="calendar-nav">
        <button class="nav-btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2 id="month-label">2026年3月</h2>
        <button class="nav-btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
    <div class="admin-section">
        <div class="admin-btns">
            <button class="btn-small" onclick="exportData()"><i class="fas fa-copy"></i> 匯出代碼</button>
            <button class="btn-small" onclick="importData()"><i class="fas fa-file-import"></i> 匯入代碼</button>
        </div>
    </div>
</div>

<div id="challenge-view">
    <div class="top-controls">
        <button class="control-btn" onclick="exitToCalendar()"><i class="fas fa-home"></i></button>
        <button class="control-btn" title="重設今天進度" onclick="resetToday()"><i class="fas fa-undo-alt"></i></button>
    </div>
    
    <div id="mode-tag" class="mode-indicator mode-listen">自動閃視 (聽模式)</div>
    <div id="task-info" class="progress-text">剩餘：-- 詞</div>
    
    <div id="word-display">...</div>
    
    <button id="btn-pause" class="btn-pause" onclick="togglePause()"><i class="fas fa-pause"></i></button>
    
    <div id="voice-mic" style="visibility: hidden;"><i class="fas fa-microphone"></i></div>
    <div id="status-msg" style="height:20px; color:#95a5a6; font-size:0.85rem; font-weight:bold;"></div>
    
    <button id="btn-challenge" class="btn-main btn-challenge" onclick="switchToReadMode()">我要挑戰 (讀)</button>
    <button id="btn-return" class="btn-main btn-return" onclick="switchToListenMode()">返回閃視</button>
</div>

const p3Words = "興奮,難過,焦急,驚奇,懷疑,驕傲,慚買,慶幸,盼望,思念,感動,委屈,憤怒,平靜,得意,害怕,擔憂,滿意,後悔,驚訝,傷心,愉快,煩惱,痛快,焦慮,親切,溫柔,憤恨,遺憾,痛心,失望,絕望,振奮,驚慌,害羞,寬慰,繁華,寧靜,壯觀,朦朧,翠綠,茂盛,凋謝,清脆,寬闊,狹窄,陡峭,崎嶇,清澈,湛藍,五光十色,柔軟,堅硬,粗糙,平滑,細緻,鮮艷,灰暗,透明,沉重,輕巧,濃郁,清淡,刺耳,芬芳,冰冷,滾燙,倒影,環繞,延綿,遼闊,從前,神奇,魔幻,仙女,城堡,森林,怪物,變幻,願望,善良,邪惡,報答,誠實,結果,後來,突然,竟然,果然,最後,經歷,解決,希望,夢想,道理,困難,容易,珍惜,浪費,保護,破壞,重要,特別,發現,觀察,試驗,結局,遭遇,高山,深谷,河流,海洋,平原,島嶼,沙漠,瀑布,泉水,港口,沙灘,懸崖,叢林,溪流,湖泊,山脈,盆地,丘陵,濕地,旋轉,搖晃,跳動,擺動,滑行,飛翔,降落,漂浮,沉沒,燃燒,爆炸,分裂,結合,掩護,進攻,防守,追逐".split(',');
const p4Words = "觀察,實驗,證明,創造,想像,豐富,精彩,深刻,欣賞,讚美,批評,建議,改善,效率,節省,累積,經驗,智慧,慈祥,嚴厲,和藹,剛強,內向,外向,謙虛,傲慢,機靈,穩重,馬虎,細心,慷慨,吝嗇,感激,憐憫,同情,懷念,敬佩,羨慕,嫉妒,厭惡,原諒,信任,孤獨,毅力,果斷,正直,奸詐,頑強,平易近人,默默無聞,堅持不懈,不屈不撓,一心一意,自言自語,五顏六色,走馬看花,目瞪口呆,大公無私,力不從心,半途而廢,名列前茅,垂頭喪氣,胸有成竹,得意洋洋,破口大罵,悶悶不樂,視而不見,無影無蹤,萬眾一心,情不自禁,千變萬化,大海撈針,守口如瓶,廢寢忘食,驚心動魄,隨遇而安,異想天開,出口成章,入木三分,名副其實,大言不慚,不知所措,以身作則,因材施教,老馬識途,再接再厲,百折不撓,自強不息,忍辱負重,走投無路,其貌不揚,刻骨銘心,念念不忘,如同,彷彿,閃爍,襯托,比喻,生動,感人,層次,細膩,描繪,總結,鋪陳,擬人,誇張,對比,排比,反問,設問,呼應,過渡,聯想,引用,渲染,側寫,伏筆,精煉,流暢,生澀,含蓄,直白,主旨,段落,概括,結構,昇華,意象".split(',');
const p5Words = "價值,意義,態度,信念,理想,意志,勇氣,智慧,磨練,考驗,機遇,挑戰,趨勢,貢獻,傳統,革新,責任感,榮譽感,包容,和諧,正義,公理,邏輯,偏見,主觀,客觀,判斷,選擇,決定,後果,目標,實踐,恆心,毅力,反省,映襯,鋪墊,反思,感悟,意境,昇華,象徵,側寫,烘托,扣人心弦,精雕細琢,引引人入勝,言簡意賅,惟妙惟肖,妙筆生花,畫龍點睛,別開生面,不落俗套,意蘊深長,層次分明,首尾呼應,跌宕起伏,感人肺腑,嘆為觀止,慶祝,節日,秩序,繁榮,落後,競爭,合作,分配,義務,權利,福利,建設,發展,資源,保育,污染,氣候變遷,多樣性,演化,繁衍,棲息,滅絕,平衡,循環,再生,減少,廢物,能源,低碳,綠色生活,危機,共識,政策,意識,不可思議,不勞而獲,心曠神怡,見義勇為,言行一致,刻苦耐勞,理直氣壯,落井下石,精益求精,語重心長,鍥而不捨,驚慌失措,舉一反三,隨機應變,實事求是,堅持不懈,赴湯朵火,指鹿為馬,望洋興嘆,聞雞起舞".split(',');
const p6Words = "前程似錦,後會有期,萍水相逢,朝夕相對,患難與共,捨己為人,推陳出新,袖手旁觀,肅然起敬,微不足道,雷厲風行,慷慨解囊,應接不暇,獲益匪淺,難能可貴,瞻前顧後,離鄉別井,飲水思源,學富五車,默默耕耘,自討苦吃,得寸進尺,趨勢,革新,治理,政策,和諧,永續,全球化,競爭力,優勢,劣勢,關鍵,轉型,展望,民主,法治,義務,公民,權利,爭議,平衡,協調,衝突,改善,效率,指標,監督,評估,透明度,公共利益,社區意識,人權,發展路徑,多元化,惆悵,眷戀,釋懷,沉鬱,慨嘆,欣謂,徬徨,羞赧,焦躁,淡泊,懷舊,憧憬,身歷其境,感觸,唏噓,昂揚,憂傷,喜悅,空靈,質樸,華麗,冷峻,奔放,激昂,平實,深奧,淺顯,晦澀,明快,優美,細膩,粗獷,幽默,諷刺,真實,虛幻,同窗,恩師,勉勵,前途,回憶,珍重,揚帆,啟航,奮鬥,光陰,不捨,踏實,前進,志向,抱負,信念,勇往直前,白駒過隙,光陰似箭,歲月流逝,難忘,純真,友情,離情依依,繼往開來,自強不息,宏偉,目標,成就,感激,祝福,夢想成真".split(',');

// 順序調整：P2 -> EXAM -> P3 -> P4 -> P5 -> P6
const TOTAL_POOL = [...new Set([...p2Words, ...examWords, ...p3Words, ...p4Words, ...p5Words, ...p6Words])];
const START_LIMIT = new Date("2026-03-25T00:00:00"); 
const STORAGE_KEY = 'hero_v1.7_final';

let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { completed: {}, fails: {}, daily_progress: {} };
let viewDate = new Date();
let currentWords = [], currentIdx = 0, flashTimer = null, recognition = null;
let isReadMode = false, isPaused = false;

function init() {
    setupRecognition();
    const todayStr = new Date().toLocaleDateString('sv-SE');
    if (new Date() >= START_LIMIT && !userData.completed[todayStr]) startTask(todayStr); 
    else renderCalendar();
}

// --- 進度與數據管理 ---
function exportData() {
    navigator.clipboard.writeText(JSON.stringify(userData)).then(() => alert("數據已複製，可貼上至新裝置。"));
}
function importData() {
    const code = prompt("請貼上匯入代碼：");
    if (code) { try { userData = JSON.parse(code); localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); location.reload(); } catch(e){ alert("代碼格式不正確！"); } }
}

function resetToday() {
    if (confirm("要重新挑戰今天的詞語嗎？")) {
        delete userData.completed[window.activeDate];
        if(userData.daily_progress) delete userData.daily_progress[window.activeDate];
        save(); startTask(window.activeDate);
    }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); }

// --- 月曆邏輯 ---
function renderCalendar() {
    document.getElementById('calendar-view').style.display = 'flex';
    document.getElementById('challenge-view').style.display = 'none';
    const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    document.getElementById('month-label').innerText = `${y}年${m + 1}月`;
    const firstDay = new Date(y, m, 1).getDay();
    const totalDays = new Date(y, m + 1, 0).getDate();
    for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
    for(let d=1; d<=totalDays; d++) {
        const dObj = new Date(y, m, d), dStr = dObj.toLocaleDateString('sv-SE');
        const div = document.createElement('div'); div.className = 'day-box'; div.innerText = d;
        if (dObj < START_LIMIT) div.classList.add('locked');
        else if (dObj > new Date()) div.classList.add('future');
        else {
            if(dStr === new Date().toLocaleDateString('sv-SE')) div.classList.add('today');
            if(userData.completed[dStr]) div.classList.add('completed');
            div.onclick = () => startTask(dStr);
        }
        grid.appendChild(div);
    }
}

function startTask(dateStr) {
    window.activeDate = dateStr;
    isPaused = false;
    document.getElementById('calendar-view').style.display = 'none';
    document.getElementById('challenge-view').style.display = 'flex';
    
    const targetDate = new Date(dateStr + "T00:00:00");
    const diffDays = Math.floor((targetDate - START_LIMIT) / 86400000);
    const dayOfWeek = targetDate.getDay();
    
    // 💡 計算到「今天」為止，按進度應該已經學過的總詞池範圍
    // 每一個平日進度是 10 個詞，所以計算到當前天數對應的 index
    const totalLearnedIndex = (diffDays + 1) * 10;
    const learnedPool = TOTAL_POOL.slice(0, Math.min(totalLearnedIndex, TOTAL_POOL.length));
    
    let fullList = [];
    
    if(dayOfWeek >= 1 && dayOfWeek <= 5) {
        // 平日：維持 10 個新詞
        const startIdx = (diffDays * 10) % TOTAL_POOL.length;
        fullList = TOTAL_POOL.slice(startIdx, startIdx + 10);
    } else if(dayOfWeek === 6) {
        // 星期六：錯字特訓 (改為 15 個)
        // 優先從已學過的範圍中找錯字
        let fails = Object.entries(userData.fails)
            .filter(x => x[1] > 0 && learnedPool.includes(x[0]))
            .sort((a,b) => b[1] - a[1])
            .map(x => x[0]);
            
        if(fails.length >= 15) {
            fullList = fails.slice(0, 15);
        } else {
            // 如果錯字不夠 15 個，從已學過的詞池隨機補齊
            const extra = learnedPool.filter(w => !fails.includes(w)).sort(() => 0.5 - Math.random());
            fullList = [...fails, ...extra].slice(0, 15);
        }
    } else {
        // 星期日：隨機複習 (改為 15 個，且只從已學過的 learnedPool 抽)
        fullList = [...learnedPool].sort(() => 0.5 - Math.random()).slice(0, 15);
    }

    // 斷點續傳：過濾當天已讀正確的詞
    const doneToday = userData.daily_progress[dateStr] || [];
    currentWords = fullList.filter(w => !doneToday.includes(w));

    if(currentWords.length === 0 && fullList.length > 0) {
        finish();
    } else {
        currentIdx = 0;
        switchToListenMode();
    }
}

// --- 模式切換與控制 ---
function togglePause() {
    isPaused = !isPaused;
    const btn = document.getElementById('btn-pause');
    if (isPaused) {
        btn.innerHTML = '<i class="fas fa-play"></i>'; btn.style.background = "var(--success)"; btn.style.color = "white";
        clearInterval(flashTimer); window.speechSynthesis.cancel();
    } else {
        btn.innerHTML = '<i class="fas fa-pause"></i>'; btn.style.background = "#ced4da"; btn.style.color = "#495057";
        if (!isReadMode) runFlash();
    }
}

function switchToListenMode() {
    isReadMode = false; stopRec();
    document.getElementById('mode-tag').className = "mode-indicator mode-listen";
    document.getElementById('mode-tag').innerText = "自動閃視 (聽模式)";
    document.getElementById('btn-challenge').style.display = "block";
    document.getElementById('btn-return').style.display = "none";
    document.getElementById('btn-pause').style.display = "block";
    document.getElementById('voice-mic').style.visibility = "hidden";
    runFlash();
}

function switchToReadMode() {
    isReadMode = true; clearInterval(flashTimer);
    document.getElementById('mode-tag').className = "mode-indicator mode-read";
    document.getElementById('mode-tag').innerText = "挑戰模式 (請讀出)";
    document.getElementById('btn-challenge').style.display = "none";
    document.getElementById('btn-return').style.display = "block";
    document.getElementById('btn-pause').style.display = "none";
    document.getElementById('voice-mic').style.visibility = "visible";
    document.getElementById('voice-mic').classList.add('active-mic');
    startRec(); showWord();
}

function runFlash() {
    if(flashTimer) clearInterval(flashTimer);
    showWord();
    flashTimer = setInterval(() => { if(!isPaused) { currentIdx = (currentIdx + 1) % currentWords.length; showWord(); } }, 1500);
}

function showWord() {
    if(currentWords.length === 0) return;
    const word = currentWords[currentIdx];
    const display = document.getElementById('word-display');
    display.innerText = word || "";
    display.classList.remove('correct');
    document.getElementById('task-info').innerText = `剩餘：${currentWords.length} 詞`;
    if (!isReadMode && word && !isPaused) speak(word);
}

// --- 語音辨識與朗讀 ---
function setupRecognition() {
    const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!sr) return;
    recognition = new sr(); recognition.lang = 'zh-HK'; recognition.continuous = true;
    recognition.onresult = (e) => {
        if(!isReadMode || isPaused) return;
        const text = e.results[e.results.length-1][0].transcript.replace(/[，。？！\s]/g, '');
        const target = currentWords[currentIdx];
        document.getElementById('status-msg').innerText = `聽到：${text}`;
        if(text.includes(target)) {
            document.getElementById('word-display').classList.add('correct');
            
            // 實時保存：記錄當天已讀詞語
            if(!userData.daily_progress[window.activeDate]) userData.daily_progress[window.activeDate] = [];
            if(!userData.daily_progress[window.activeDate].includes(target)) {
                userData.daily_progress[window.activeDate].push(target);
            }
            userData.fails[target] = 0; 
            save();

            setTimeout(() => {
                currentWords.splice(currentIdx, 1);
                if(currentWords.length === 0) finish();
                else { if(currentIdx >= currentWords.length) currentIdx = 0; showWord(); }
            }, 800);
        } else {
            userData.fails[target] = (userData.fails[target] || 0) + 1;
            save();
        }
    };
    recognition.onend = () => { if(isReadMode) startRec(); };
}

function finish() {
    stopRec(); userData.completed[window.activeDate] = true; save();
    document.getElementById('word-display').innerText = "任務完成！";
    speak("好棒呀！今日嘅任務做完喇！");
    setTimeout(renderCalendar, 2500);
}

function startRec() { try { recognition.start(); } catch(e){} }
function stopRec() { try { recognition.stop(); } catch(e){} }
function speak(t) { if(!t)return; window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(t); m.lang='zh-HK'; window.speechSynthesis.speak(m); }
function exitToCalendar() { clearInterval(flashTimer); stopRec(); renderCalendar(); }
function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }

init();
</script>
