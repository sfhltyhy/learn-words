<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認字英雄傳：每日打卡版 v1.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f1c40f;
            --bg: #ecf0f1;
            --success: #27ae60;
            --fail: #e74c3c;
            --card-bg: #ffffff;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: #333; }
        
        /* 煙花動畫 Canvas */
        #fireworks { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }

        /* 月曆主介面 */
        #calendar-view { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: var(--primary); padding: 0 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex: 1; align-content: start; }
        .day-box { background: var(--card-bg); border-radius: 12px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 2px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s; }
        .day-box:active { transform: scale(0.95); }
        .day-box.today { border-color: var(--accent); background: #fffde7; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .day-box.completed::after { content: '✅'; position: absolute; top: 5px; right: 5px; font-size: 14px; }
        .day-box.future { opacity: 0.3; pointer-events: none; background: #ddd; }
        .day-box.missed { border-color: var(--fail); background: #fff5f5; }
        .day-num { font-weight: bold; font-size: 1.3rem; }
        
        /* 挑戰/閃卡介面 */
        #challenge-view { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; background: white; position: relative; }
        
        /* 閃卡核心區域 */
        .flash-card-area { width: 100%; max-width: 600px; height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #word-display { font-size: clamp(3rem, 18vw, 8rem); font-weight: 900; color: var(--primary); margin-bottom: 20px; letter-spacing: 5px; transition: color 0.2s; }
        #word-display.correct { color: var(--success) !important; animation: popSuccess 0.3s; }
        
        /* 語音指示器 */
        #voice-indicator { width: 80px; height: 80px; border-radius: 50%; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.3s; border: 3px solid transparent; }
        .listening { border-color: #e74c3c66; background: #fff5f5 !important; color: #e74c3c; animation: pulseMic 1.5s infinite; }
        
        /* 進度條與資訊 */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #eee; z-index: 100; }
        .progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }
        #task-info { position: fixed; top: 15px; right: 20px; font-size: 0.9rem; color: #7f8c8d; font-weight: bold; z-index: 90; }

        /* 按鈕控制 */
        .controls { margin-top: 40px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 24px; border-radius: 30px; border: none; font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: bold; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .btn-reset { background: #95a5a6; color: white; }
        .btn-back { position: fixed; top: 10px; left: 10px; background: rgba(255,255,255,0.8); border: 1px solid #ddd; z-index: 110; color: var(--primary); padding: 8px 15px; font-size: 0.9rem; }
        
        #status-msg { height: 25px; color: #666; margin-top: 10px; font-size: 0.9rem; min-height: 25px; }

        /* 動畫效果 */
        @keyframes pulseMic { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        @keyframes popSuccess { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fireworksAnimation { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
        
        .firework-particle { position: fixed; width: 6px; height: 6px; border-radius: 50%; animation: fireworksAnimation 1s ease-out forwards; pointer-events: none; z-index: 10000; }
    </style>
</head>

// --- 狀態管理 ---
let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    completedDates: {}, // {"2026-03-19": true}
    failCounts: {}     // {"詞語": 5}
};

const todayStr = new Date().toISOString().split('T')[0];
let currentSessionWords = []; // 當前任務的10/20/30詞
let currentWordIdx = 0;
let flashInterval = null; // 閃視計時器

let isSpeaking = false; // 是否正在朗讀 (防止語音辨識錄到系統聲音)

// --- 初始化 ---
function init() {
    setupSpeechRecognition();
    renderCalendar();
    
    // 智能判斷：今日未達標則直入挑戰
    if (!userData.completedDates[todayStr]) {
        startDailyTask(todayStr);
    } else {
        showCalendar(); // 已達標則顯示月曆
    }
}

// --- 月曆邏輯 ---
function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    const date = new Date();
    const year = date.getFullYear();
    const month = date.getMonth();
    
    // 設定標題
    document.getElementById('month-title').innerText = `${year}年${month + 1}月英雄榜`;
    
    // 計算月份第一天是星期幾
    const firstDayOfWeek = new Date(year, month, 1).getDay(); // 0 (日) 到 6 (六)
    // 計算月份總天數
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // 填充月份前的空白
    for (let i = 0; i < firstDayOfWeek; i++) {
        grid.appendChild(document.createElement('div'));
    }

    // 填充日期
    for (let d = 1; d <= daysInMonth; d++) {
        const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const div = document.createElement('div');
        div.className = 'day-box';
        
        // 樣式判斷
        if (dStr === todayStr) div.classList.add('today');
        if (dStr > todayStr) div.classList.add('future');
        if (userData.completedDates[dStr]) div.classList.add('completed');
        // 漏做判斷 (過去且未完成)
        if (dStr < todayStr && !userData.completedDates[dStr]) div.classList.add('missed');

        div.innerHTML = `<span class="day-num">${d}</span>`;
        
        // 點擊事件：未來的日子不能點
        if (dStr <= todayStr) {
            div.onclick = () => startDailyTask(dStr);
        }
        
        grid.appendChild(div);
    }
    
    // 更新累計數據 (計算連續達標暫時簡化)
    const completedCount = Object.keys(userData.completedDates).length;
    document.getElementById('total-stats').innerText = `總共達標: ${completedCount} 天`;
}

function showCalendar() {
    stopFlash();
    stopListening();
    document.getElementById('calendar-view').style.display = 'flex';
    document.getElementById('challenge-view').style.display = 'none';
    document.getElementById('task-info').innerText = "";
    renderCalendar();
}

// --- 挑戰/閃視邏輯核心 ---
function startDailyTask(dateStr) {
    document.getElementById('calendar-view').style.display = 'none';
    document.getElementById('challenge-view').style.display = 'flex';
    document.getElementById('word-display').classList.remove('correct');
    
    generateDailyWords(dateStr);
    currentWordIdx = 0;
    
    // 顯示今日任務類型
    const d = new Date(dateStr);
    const type = (dateStr === todayStr) ? "今日" : "補做";
    document.getElementById('task-info').innerText = `${type}任務 (${currentSessionWords.length}詞)`;

    showWordAndStartFlash();
    startListening();
}

// 自動分配詞語算法
function generateDailyWords(dateStr) {
    const d = new Date(dateStr);
    const dayOfWeek = d.getDay(); // 0:日, 6:六

    if (dayOfWeek >= 1 && dayOfWeek <= 5) { // 平日 (一至五): 10個新詞
        // 計算 Offset (基於 START_DATE_STR)
        const startDate = new Date(START_DATE_STR);
        const diffTime = Math.abs(d - startDate);
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)); 
        
        const startIdx = (diffDays * 10) % TOTAL_WORD_POOL.length;
        currentSessionWords = TOTAL_WORD_POOL.slice(startIdx, startIdx + 10);
        
        // 如果尾部不足10個，自動循環取頭部補齊
        if (currentSessionWords.length < 10) {
            const needed = 10 - currentSessionWords.length;
            currentSessionWords = [...currentSessionWords, ...TOTAL_WORD_POOL.slice(0, needed)];
        }
    } 
    else if (dayOfWeek === 6) { // 週六: 本週最弱 (失敗次數最多) 20個
        // 篩選出有失敗記錄的詞，並按次序降序排列
        const sortedWeakWords = Object.entries(userData.failCounts)
            .filter(entry => entry[1] > 0) // 只取有失敗過的
            .sort((a,b) => b[1] - a[1]) // 次數多排前
            .map(entry => entry[0]);
            
        if (sortedWeakWords.length >= 20) {
            currentSessionWords = sortedWeakWords.slice(0, 20);
        } else if (sortedWeakWords.length > 0) {
            // 不足20個，用隨機詞補齊
            const needed = 20 - sortedWeakWords.length;
            const randomFill = [...TOTAL_WORD_POOL].sort(() => 0.5 - Math.random()).slice(0, needed);
            currentSessionWords = [...sortedWeakWords, ...randomFill];
        } else {
            // 完全冇失敗記錄，純隨機20個
            currentSessionWords = [...TOTAL_WORD_POOL].sort(() => 0.5 - Math.random()).slice(0, 20);
        }
    } 
    else { // 週日: 時光回溯 (隨機舊詞) 30個
        // 優先挑選日期久遠的邏輯暫時簡化為純隨機 (防止 Pool 太小)
        currentSessionWords = [...TOTAL_WORD_POOL].sort(() => 0.5 - Math.random()).slice(0, 30);
    }
}

function showWordAndStartFlash() {
    stopFlash(); // 先清空舊的計時器
    showCurrentWord();
    
    // 設定閃視計時器 (1.5秒一跳)
    flashInterval = setInterval(() => {
        goNextWord();
    }, FLASH_SPEED);
}

function showCurrentWord() {
    if (currentSessionWords.length === 0) return;
    
    const wordDisplay = document.getElementById('word-display');
    const word = currentSessionWords[currentWordIdx];
    
    wordDisplay.innerText = word;
    wordDisplay.classList.remove('correct'); // 清除成功樣式
    
    // 更新進度條
    const progressPercent = ((currentWordIdx + 1) / currentSessionWords.length) * 100;
    document.getElementById('progress-bar').style.width = `${progressPercent}%`;
    
    // 自動朗讀
    speak(word);
}

function goNextWord() {
    currentWordIdx++;
    // 循環播放邏輯
    if (currentWordIdx >= currentSessionWords.length) {
        currentWordIdx = 0;
    }
    showCurrentWord();
}

function stopFlash() {
    if (flashInterval) {
        clearInterval(flashInterval);
        flashInterval = null;
    }
}

// 重置今日按鈕 (不管是否完成，都重新開始今日的10詞挑戰)
function resetToday() {
    // 重新強制生成今日 (todayStr) 的詞彙
    generateDailyWords(todayStr);
    currentWordIdx = 0;
    
    document.getElementById('word-display').classList.remove('correct');
    document.getElementById('task-info').innerText = `今日任務 (重讀)`;
    
    // 重新開始閃視和辨識
    showWordAndStartFlash();
    startListening();
}

// --- 語音辨識核心 (與昨日 v5.6 信心值一致) ---
function setupSpeechRecognition() {
    if (!('webkitSpeechRecognition' in window)) {
        document.getElementById('status-msg').innerText = "提示：此瀏覽器不支援語音辨識。";
        return;
    }
    
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'zh-HK'; // 設定粵語
    recognition.continuous = true; // 持續監聽
    recognition.interimResults = false; // 只取最終結果

    recognition.onresult = (event) => {
        // 如果正在朗讀，忽略辨識結果
        if (isSpeaking) return;

        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript;
            }
        }
        
        if (finalTranscript === '') return;
        
        // 清理辨識結果
        const heardText = finalTranscript.trim().replace(/[，。？！、\s]/g, '');
        const targetWord = currentSessionWords[currentWordIdx];
        
        document.getElementById('status-msg').innerText = `聽到：${heardText}`;

        // 比對邏輯
        if (heardText === targetWord) {
            handleVoiceSuccess();
        } else {
            // 辨識失敗，記錄次數 (用於週六)
            if (targetWord) {
                userData.failCounts[targetWord] = (userData.failCounts[targetWord] || 0) + 1;
                saveData();
            }
            // 視覺回饋 (紅光閃爍)
            document.getElementById('voice-indicator').style.color = '#e74c3c';
            setTimeout(() => document.getElementById('voice-indicator').style.color = '', 400);
        }
    };

    recognition.onerror = (event) => {
        console.error("辨識出錯:", event.error);
        if (event.error === 'network') document.getElementById('status-msg').innerText = "網絡連接失敗。";
    };

    recognition.onend = () => {
        // 非主動停止的情況下，如果還在挑戰頁面，自動重啟
        if (document.getElementById('challenge-view').style.display === 'flex') {
            try { recognition.start(); } catch(e) {}
        } else {
            document.getElementById('voice-indicator').classList.remove('listening');
        }
    };
}

// 語音搶答成功處理
function handleVoiceSuccess() {
    stopFlash(); // 辨識成功，即刻停止舊嘅 1.5s 計時器
    
    const wordDisplay = document.getElementById('word-display');
    wordDisplay.classList.add('correct'); // 變綠色+動畫
    playSuccessSound(); // 播放成功短音

    // 重置失敗次數 (識讀咗就唔算難詞)
    userData.failCounts[currentSessionWords[currentWordIdx]] = 0;
    saveData();

    // 延遲 0.6 秒後跳下一題，防止太快睇唔到綠色
    setTimeout(() => {
        // 判斷是否為「最後一個新詞」
        if (isAllTaskCompleted()) {
            completeDailyTask();
        } else {
            // 跳下一題，並重啟 1.5s 閃視計時
            currentWordIdx = (currentWordIdx + 1) % currentSessionWords.length;
            // 如果跳咗之後發現係 0，代表循環咗，要判斷係咪平日模式 (平日唔循環)
            if (currentWordIdx === 0 && currentSessionWords.length === 10) {
                 // 平日模式讀完10個其實就完咗，但因為有失敗次數可能仲喺度
                 // 這裡邏輯改為：語音辨識成功嘅詞會從現有清單暫時移除，直到清單清空
                 handle平日VoiceSuccess();
            } else {
                showWordAndStartFlash(); 
            }
        }
    }, 600);
}

// 平日 10 詞專用邏輯：讀對一個，清單少一個
function handle平日VoiceSuccess() {
    // 平日模式下，從 Session清單中暫時移除識讀嘅詞
    currentSessionWords.splice(currentWordIdx, 1);
    
    if (currentSessionWords.length === 0) {
        completeDailyTask();
    } else {
        // 移除後索引不需要加，因為後面的補上來了
        if (currentWordIdx >= currentSessionWords.length) currentWordIdx = 0;
        showWordAndStartFlash();
    }
}

// 判斷任務是否完成
function isAllTaskCompleted() {
    const dayOfWeek = new Date().getDay();
    if (dayOfWeek >= 1 && dayOfWeek <= 5) {
        // 平日模式使用 splice 邏輯，在 handle平日VoiceSuccess 判斷
        return false; 
    } else {
        // 週六日模式：讀對最後一個詞就算完，不需要全部清空 (因為平日未完)
        // 這個邏輯Anthony沒特別講，我設定為：週六日只需讀完一張 Loop (20/30詞) 即可。
        //Anthony 原意是必須語音辨識成功，所以這裡修改為：週六日也是讀對一個少一個
        return false;
    }
}
// 修改 handleVoiceSuccess 內的邏輯，統一改為：讀對一個，splice 一個。
function handleVoiceSuccess() {
    stopFlash();
    const wordDisplay = document.getElementById('word-display');
    wordDisplay.classList.add('correct');
    playSuccessSound();

    userData.failCounts[currentSessionWords[currentWordIdx]] = 0;
    saveData();

    setTimeout(() => {
        currentSessionWords.splice(currentWordIdx, 1); // 讀對咗就由清單移除

        if (currentSessionWords.length === 0) {
            completeDailyTask();
        } else {
            // 索引修正
            if (currentWordIdx >= currentSessionWords.length) currentWordIdx = 0;
            showWordAndStartFlash(); // 重新顯示並開啟計時
        }
    }, 600);
}

// 完成今日任務
function completeDailyTask() {
    stopFlash();
    stopListening();
    
    // 記錄今日已完成 (只有 todayStr 能觸發剔號)
    // Anthony 構思是可以補做，所以補做舊日子都要給剔號
    const currentTaskDate = document.querySelector('.day-box.today') ? todayStr : // 這邏輯有點複雜，暫時改為：今日做就給今日剔
    // Anthony 構思是可以補做，所以補做舊日子都要給剔號
    getCurrentTaskDate(); 
    userData.completedDates[currentTaskDate] = true;
    saveData();
    
    // 動畫與聲效
    launch華麗 fireworks();
    document.getElementById('word-display').innerText = "英雄通關！";
    speak("峻宇妹妹，任務完成，好棒呀！");

    setTimeout(showCalendar, 3500);
}

function getCurrentTaskDate() {
    const info = document.getElementById('task-info').innerText;
    if (info.includes("今日")) return todayStr;
    // 補做模式下，如何獲取點擊的日期？
    // 修改 startDailyTask，將日期存入全局變量
    return window.currentTaskingDate; 
}
// 修改 startDailyTask
function startDailyTask(dateStr) {
    window.currentTaskingDate = dateStr; // 存入全局
    // ... 原有代碼
}


function startListening() {
    if (!recognition) return;
    try { recognition.start(); } catch(e) {}
    document.getElementById('voice-indicator').classList.add('listening');
    document.getElementById('voice-indicator').style.color = '';
}

function stopListening() {
    if (!recognition) return;
    recognition.stop();
    document.getElementById('voice-indicator').classList.remove('listening');
}

// --- 公共工具 ---
function speak(text) {
    window.speechSynthesis.cancel();
    isSpeaking = true;
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'zh-HK';
    msg.rate = 1.1; // 稍微快一點點
    msg.onend = () => { isSpeaking = false; };
    window.speechSynthesis.speak(msg);
}

function playSuccessSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        g.gain.setValueAtTime(0.1, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); }
function exportData() { prompt("峻宇妹妹的戰力代碼 (請全選複製)：", btoa(encodeURIComponent(JSON.stringify(userData)))); }

// --- 煙花動畫 (全屏粒子效果) ---
function launch華麗 fireworks() {
    const container = document.body;
    for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'firework-particle';
        p.style.left = '50%'; p.style.top = '50%';
        p.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 60%)`;
        p.style.setProperty('--tx', `${(Math.random()-0.5) * 800}px`);
        p.style.setProperty('--ty', `${(Math.random()-0.5) * 600}px`);
        // 使用 CSS 變量控制方向
        p.style.animation = `fireworksAnimation ${0.5 + Math.random()}s ease-out forwards`;
        container.appendChild(p);
        setTimeout(() => p.remove(), 1500);
    }
}
// 修正煙花 CSS 變量
const style = document.createElement('style');
style.innerHTML = `
@keyframes fireworksAnimation {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.5); opacity: 0; }
}
`;
document.head.appendChild(style);

init();
