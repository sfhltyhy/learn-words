<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認字英雄傳：每日任務版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <canvas id="fireworks" style="position:fixed;top:0;left:0;pointer-events:none;z-index:9999;"></canvas>
    <style>
        :root {
            --primary: #2d5a27;
            --accent: #f1c40f;
            --bg: #f4f7f6;
            --success: #27ae60;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 月曆樣式 */
        #calendar-view { padding: 20px; overflow-y: auto; flex: 1; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: var(--primary); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-box { background: white; border-radius: 8px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 2px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .day-box.today { border-color: var(--accent); background: #fffde7; }
        .day-box.completed::after { content: '✅'; position: absolute; top: 2px; right: 2px; font-size: 12px; }
        .day-box.future { opacity: 0.4; pointer-events: none; }
        .day-num { font-weight: bold; font-size: 1.2rem; }
        
        /* 挑戰模式樣式 */
        #challenge-view { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #word-display { font-size: 5rem; font-weight: 900; color: var(--primary); margin-bottom: 30px; letter-spacing: 10px; }
        #voice-indicator { width: 100px; height: 100px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; transition: all 0.3s; }
        .listening { background: #ffeded !important; color: #e74c3c; transform: scale(1.1); box-shadow: 0 0 20px #e74c3c66 !important; }
        
        /* 按鈕 */
        .btn { padding: 12px 25px; border-radius: 25px; border: none; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-reset { background: #95a5a6; color: white; margin-top: 50px; }
        .btn-back { position: fixed; top: 10px; left: 10px; background: white; border: 1px solid #ddd; z-index: 100; }
        
        #status-msg { height: 30px; color: #666; margin-top: 10px; }
        .progress-bar { position: fixed; top: 0; left: 0; height: 5px; background: var(--success); transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="calendar-view">
        <div class="calendar-header">
            <h2 id="month-title">2026年3月</h2>
            <div id="stats">累計達標: 0 天</div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div style="text-align:center; margin-top:30px;">
            <button class="btn" onclick="exportData()" style="background:#ddd;">備份進度</button>
        </div>
    </div>

    <div id="challenge-view">
        <button class="btn btn-back" onclick="showCalendar()"><i class="fas fa-calendar-alt"></i> 返回月曆</button>
        <div class="progress-bar" id="progress-bar"></div>
        <div id="current-task-info" style="color:#7f8c8d; margin-bottom:10px;"></div>
        <div id="word-display">載入中...</div>
        <div id="voice-indicator"><i class="fas fa-microphone"></i></div>
        <div id="status-msg">準備就緒</div>
        
        <button class="btn btn-reset" onclick="resetToday()"><i class="fas fa-undo"></i> 重讀今日</button>
    </div>

<script>
// --- 詞庫部分 (簡化示意，包含P2-P6邏輯) ---
const p2Words = ["太陽", "月亮", "星星", "天空", "大地", "花朵", "草地", "樹木", "河流", "高山", "老師", "同學", "學校", "課室", "學習", "寫字", "讀書", "唱歌", "跳舞", "遊戲"]; 
const p3Words = ["勇敢", "聰明", "活潑", "美麗", "環境", "保護", "珍惜", "時間", "禮貌", "尊敬", "幫助", "分享", "快樂", "健康", "運動", "休息", "注意", "安全", "觀察", "思考"];
// ... 此處應放入你昨天的完整詞庫，為節省空間先以兩組代表 ...
let ALL_WORDS = [...p2Words, ...p3Words]; 
// 實際運行時，請確保 ALL_WORDS 包含 P2-P6 所有詞

// --- 數據管理 ---
let userData = JSON.parse(localStorage.getItem('hero_daily_data')) || {
    completedDates: {}, // {"2026-03-19": true}
    failCounts: {},    // {"詞語": 5}
    startIndex: 0      // 目前讀到詞庫第幾個
};

const todayStr = new Date().toISOString().split('T')[0];
let currentSessionWords = [];
let currentWordIdx = 0;

// --- 初始化 ---
function init() {
    renderCalendar();
    if (!userData.completedDates[todayStr]) {
        startDailyTask(todayStr);
    }
}

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    const date = new Date();
    const year = date.getFullYear();
    const month = date.getMonth();
    document.getElementById('month-title').innerText = `${year}年${month + 1}月`;
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement('div'));
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const div = document.createElement('div');
        div.className = `day-box ${dStr === todayStr ? 'today' : ''} ${dStr > todayStr ? 'future' : ''} ${userData.completedDates[dStr] ? 'completed' : ''}`;
        div.innerHTML = `<span class="day-num">${d}</span>`;
        div.onclick = () => startDailyTask(dStr);
        grid.appendChild(div);
    }
    document.getElementById('stats').innerText = `累計達標: ${Object.keys(userData.completedDates).length} 天`;
}

function startDailyTask(dateStr) {
    document.getElementById('calendar-view').style.display = 'none';
    document.getElementById('challenge-view').style.display = 'flex';
    
    generateDailyWords(dateStr);
    currentWordIdx = 0;
    showWord();
    startListening();
}

function generateDailyWords(dateStr) {
    const d = new Date(dateStr);
    const dayOfWeek = d.getDay(); // 0:日, 6:六

    if (dayOfWeek >= 1 && dayOfWeek <= 5) { // 平日: 10個新詞
        const dayOffset = Math.floor((d - new Date("2026-03-01")) / 86400000); // 簡單進度計算
        const start = (dayOffset * 10) % ALL_WORDS.length;
        currentSessionWords = ALL_WORDS.slice(start, start + 10);
        document.getElementById('current-task-info').innerText = "今日任務：10個新詞彙";
    } 
    else if (dayOfWeek === 6) { // 週六: 本週最弱20個
        const weakWords = Object.entries(userData.failCounts)
            .sort((a,b) => b[1] - a[1])
            .slice(0, 20)
            .map(x => x[0]);
        currentSessionWords = weakWords.length > 0 ? weakWords : ALL_WORDS.slice(0, 20);
        document.getElementById('current-task-info').innerText = "週六複習：本週最難詞語";
    } 
    else { // 週日: 隨機30個舊詞
        const learned = Object.keys(userData.completedDates);
        currentSessionWords = ALL_WORDS.slice(0, 30).sort(() => 0.5 - Math.random());
        document.getElementById('current-task-info').innerText = "週日挑戰：回顧過去詞彙";
    }
}

function showWord() {
    const word = currentSessionWords[currentWordIdx];
    document.getElementById('word-display').innerText = word;
    document.getElementById('progress-bar').style.width = `${((currentWordIdx) / currentSessionWords.length) * 100}%`;
    speak(word);
}

function resetToday() {
    currentWordIdx = 0;
    showWord();
}

function showCalendar() {
    document.getElementById('calendar-view').style.display = 'block';
    document.getElementById('challenge-view').style.display = 'none';
    renderCalendar();
}

// --- 語音辨識核心 ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.continuous = true;
recognition.lang = 'zh-HK';

recognition.onresult = (event) => {
    const last = event.results.length - 1;
    const text = event.results[last][0].transcript.replace(/[，。？！]/g, "");
    const target = currentSessionWords[currentWordIdx];
    
    document.getElementById('status-msg').innerText = `你說：${text}`;

    if (text.includes(target)) {
        handleSuccess();
    } else {
        userData.failCounts[target] = (userData.failCounts[target] || 0) + 1;
        saveData();
        document.getElementById('voice-indicator').style.color = '#e74c3c';
        setTimeout(() => document.getElementById('voice-indicator').style.color = '', 500);
    }
};

function handleSuccess() {
    currentWordIdx++;
    if (currentWordIdx >= currentSessionWords.length) {
        completeTask();
    } else {
        showWord();
    }
}

function completeTask() {
    userData.completedDates[todayStr] = true;
    saveData();
    launchFireworks();
    document.getElementById('word-display').innerText = "任務完成！";
    setTimeout(showCalendar, 3000);
}

function startListening() {
    try { recognition.start(); } catch(e) {}
    document.getElementById('voice-indicator').classList.add('listening');
}

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'zh-HK';
    window.speechSynthesis.speak(msg);
}

function saveData() { localStorage.setItem('hero_daily_data', JSON.stringify(userData)); }
function exportData() { alert("進度代碼：\n" + btoa(JSON.stringify(userData))); }

// --- 簡單煙花動畫 ---
function launchFireworks() {
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    // (簡化煙花邏輯：實際可換成更華麗的 library)
    ctx.fillStyle = 'gold';
    for(let i=0; i<100; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 5, 5);
}

init();
</script>
</body>
</html>
