<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認字英雄傳：每日任務版 v1.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #f1c40f; --bg: #ecf0f1; --success: #27ae60; --fail: #e74c3c; }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 月曆導航 */
        #calendar-view { padding: 15px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday { text-align: center; font-size: 0.8rem; color: #7f8c8d; padding-bottom: 5px; }
        .day-box { background: white; border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #ddd; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .day-box.today { background: #fffde7; border: 2px solid var(--accent); }
        .day-box.completed::after { content: '✅'; position: absolute; bottom: 2px; right: 2px; font-size: 10px; }
        .day-box.future { opacity: 0.4; pointer-events: none; }
        .day-box.missed { background: #fff5f5; border-color: #fab1a0; }

        /* 挑戰介面 */
        #challenge-view { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; background: white; }
        #word-display { font-size: 5.5rem; font-weight: 900; color: var(--primary); margin-bottom: 30px; letter-spacing: 5px; min-height: 1.2em; }
        #word-display.correct { color: var(--success); transform: scale(1.1); transition: 0.2s; }
        
        #voice-indicator { width: 70px; height: 70px; border-radius: 50%; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 3px solid #eee; margin-bottom: 15px; }
        .listening { border-color: var(--fail); color: var(--fail); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); } 100% { box-shadow: 0 0 0 15px rgba(231,76,60,0); } }

        .progress-bar { position: fixed; top: 0; left: 0; height: 6px; background: var(--success); transition: width 0.3s; z-index: 100; }
        .btn-back { position: fixed; top: 15px; left: 15px; padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; z-index: 110; }
        .btn-reset { background: #95a5a6; color: white; padding: 10px 20px; border-radius: 20px; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="progress-bar" id="progress-bar"></div>

<div id="calendar-view">
    <div class="calendar-nav">
        <button class="nav-btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2 id="month-label" style="margin:0; font-size:1.2rem;">2026年3月</h2>
        <button class="nav-btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
    <div style="text-align:center; padding: 20px;">
        <button onclick="exportData()" style="font-size:0.7rem; color:#999; border:none; background:none; text-decoration:underline;">備份戰力代碼</button>
    </div>
</div>

<div id="challenge-view">
    <button class="btn-back" onclick="showCalendar()"><i class="fas fa-calendar-alt"></i> 返回</button>
    <div id="task-title" style="color:#7f8c8d; margin-bottom:10px; font-weight:bold;"></div>
    <div id="word-display">載入中</div>
    <div id="voice-indicator"><i class="fas fa-microphone"></i></div>
    <div id="status-msg" style="color:#666; font-size:0.9rem; height:20px;">等待語音...</div>
    <button class="btn-reset" onclick="resetToday()">重做當天任務</button>
</div>

const p4Words = "觀察,實驗,證明,發現,發明,創造,想像,豐富,精彩,深刻,欣賞,讚美,批評,建議,改善,效率,節省,累積,經驗,智慧,慈祥,嚴厲,和藹,剛強,內向,外向,謙虛,傲慢,機靈,穩重,馬虎,細心,慷慨,吝嗇,感激,憐憫,同情,懷念,敬佩,羨慕,嫉妒,厭惡,原諒,信任,孤獨,毅力,果斷,正直,奸詐,頑強,平易近人,默默無聞,堅持不懈,不屈不撓,一心一意,自言自語,五顏六色,走馬看花,目瞪口呆,大公無私,力不從心,半途而廢,名列前茅,垂頭喪氣,胸有成竹,得意洋洋,破口大罵,悶悶不樂,視而不見,無影無蹤,萬眾一心,情不自禁,千變萬化,大海撈針,守口如瓶,廢寢忘食,驚心動魄,隨遇而安,異想天開,出口成章,入木三分,名副其實,大言不慚,不知所措,以身作則,因材施教,老馬識途,再接再厲,百折不撓,自強不息,忍辱負重,走投無路,其貌不揚,刻骨銘心,念念不忘,如同,彷彿,閃爍,襯托,比喻,生動,感人,層次,細膩,描繪,總結,鋪陳,擬人,誇張,對比,排比,反問,設問,呼應,過渡,聯想,引用,渲染,側寫,伏筆,精煉,流暢,生澀,含蓄,直白,主旨,段落,概括,結構,昇華,意象".split(',');
const p5Words = "價值,意義,態度,信念,理想,意志,勇氣,智慧,磨練,考驗,機遇,挑戰,趨勢,貢獻,傳統,革新,責任感,榮譽感,包容,和諧,正義,公理,邏輯,偏見,主觀,客觀,判斷,選擇,決定,後果,目標,實踐,恆心,毅力,反省,映襯,鋪墊,反思,感悟,意境,昇華,象徵,側寫,烘托,扣人心弦,精雕細琢,引引人入勝,言簡意賅,惟妙惟肖,妙筆生花,畫龍點睛,別開生面,不落俗套,意蘊深長,層次分明,首尾呼應,跌宕起伏,感人肺腑,嘆為觀止,慶祝,節日,秩序,繁榮,落後,競爭,合作,分配,義務,權利,福利,建設,發展,資源,保育,污染,氣候變遷,多樣性,演化,繁衍,棲息,滅絕,平衡,循環,再生,減少,廢物,能源,低碳,綠色生活,危機,共識,政策,意識,不可思議,不勞而獲,心曠神怡,見義勇為,言行一致,刻苦耐勞,理直氣壯,落井下石,精益求精,語重心長,鍥而不捨,驚慌失措,舉一反三,隨機應變,實事求是,堅持不懈,赴湯蹈火,指鹿為馬,望洋興嘆,聞雞起舞".split(',');
const p6Words = "前程似錦,後會有期,萍水相逢,朝夕相對,患難與共,捨己為人,推陳出新,袖手旁觀,肅然起敬,微不足道,雷厲風行,慷慨解囊,應接不暇,獲益匪淺,難能可貴,瞻前顧後,離鄉別井,飲水思源,學富五車,默默耕耘,自討苦吃,得寸進尺,趨勢,革新,治理,政策,和諧,永續,全球化,競爭力,優勢,劣勢,關鍵,轉型,展望,民主,法治,義務,公民,權利,爭議,平衡,協調,衝突,改善,效率,指標,監督,評估,透明度,公共利益,社區意識,人權,發展路徑,多元化,惆悵,眷戀,釋懷,沉鬱,慨嘆,欣慰,徬徨,羞赧,焦躁,淡泊,懷舊,憧憬,身歷其境,感觸,唏噓,昂揚,憂傷,喜悅,空靈,質樸,華麗,冷峻,奔放,激昂,平實,深奧,淺顯,晦澀,明快,優美,細膩,粗獷,幽默,諷刺,真實,虛幻,同窗,恩師,勉勵,前途,回憶,珍重,揚帆,啟航,奮鬥,光陰,不捨,踏實,前進,志向,抱負,信念,勇往直前,白駒過隙,光陰似箭,歲月流逝,難忘,純真,友情,離情依依,繼往開來,自強不息,宏偉,目標,成就,感激,祝福,夢想成真".split(',');
const examWords = "判斷,分析,解釋,列舉,歸納,比較,對照,選出,填寫,圈出,劃線,修正,補充,根據,引用,理由,原因,結果,影響,異同,特點,特徵,適當,錯誤,正確,正確答案,下列,以上,未必,必定,可能,顯示,反映,關鍵,主旨,中心思想,段意,承上啟下,伏筆,呼應,性格,心情,描寫,感受,啟發,體會,寓意,比喻,本體,喻體,擬人,排比,對比,誇張,反問,設問,疊字,對偶,感官,視覺,聽覺,嗅覺,相差,共,餘下,平分,平均,原本,現有,倍數,一半,增加,減少,求,計算,橫式,直式,單位,估算,實驗,觀察,記錄,結論,公平,變量,假設,功能,構造,演變,趨勢,資料,圖表,比例,分配,資源,環保,責任,權利,義務,借代,反襯,雙關,層遞,頂真,聯想,想像,象徵,反語,開門見山,卒章顯志,寓情於景,借景抒情,托物言志,先抑後揚,側面描寫,行動描寫,心理描寫".split(',');

const TOTAL_POOL = [...p2Words, ...p3Words, ...p4Words, ...p5Words, ...p6Words, ...examWords];

// --- 設定 ---
const START_FIXED_DATE = new Date("2026-03-19"); // 鎖定從今日開始
let viewDate = new Date(); // 月曆顯示的日期
let userData = JSON.parse(localStorage.getItem('hero_daily_v1_2')) || { completed: {}, fails: {} };
let currentWords = [], currentIdx = 0, flashTimer = null, recognition = null;

const todayStr = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD

function init() {
    setupRecognition();
    if (!userData.completed[todayStr]) {
        startTask(todayStr);
    } else {
        renderCalendar();
    }
}

// --- 月曆邏輯 ---
function changeMonth(step) {
    viewDate.setMonth(viewDate.getMonth() + step);
    renderCalendar();
}

function renderCalendar() {
    document.getElementById('calendar-view').style.display = 'flex';
    document.getElementById('challenge-view').style.display = 'none';
    
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    document.getElementById('month-label').innerText = `${y}年${m + 1}月`;

    // 星期頭
    "日一二三四五六".split('').forEach(d => {
        const div = document.createElement('div'); div.className='weekday'; div.innerText=d; grid.appendChild(div);
    });

    const firstDay = new Date(y, m, 1).getDay();
    const totalDays = new Date(y, m + 1, 0).getDate();

    for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

    for(let d=1; d<=totalDays; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const div = document.createElement('div');
        div.className = 'day-box';
        if(dStr === todayStr) div.classList.add('today');
        if(userData.completed[dStr]) div.classList.add('completed');
        if(new Date(dStr) < START_FIXED_DATE && dStr !== todayStr) div.style.opacity = '0.2';
        if(new Date(dStr) > new Date(todayStr)) div.classList.add('future');
        
        div.innerText = d;
        div.onclick = () => { if(new Date(dStr) <= new Date(todayStr)) startTask(dStr); };
        grid.appendChild(div);
    }
}

// --- 任務邏輯 ---
function startTask(dateStr) {
    window.taskingDate = dateStr;
    document.getElementById('calendar-view').style.display = 'none';
    document.getElementById('challenge-view').style.display = 'flex';
    
    // 計算與 3月19日 差距的天數
    const targetDate = new Date(dateStr);
    const diffDays = Math.floor((targetDate - START_FIXED_DATE) / 86400000);
    const dayOfWeek = targetDate.getDay();

    if(dayOfWeek >= 1 && dayOfWeek <= 5) { // 平日 10詞
        const start = (diffDays * 10) % TOTAL_POOL.length;
        currentWords = TOTAL_POOL.slice(start, start + 10);
        document.getElementById('task-title').innerText = "平日任務：10個新詞";
    } else if(dayOfWeek === 6) { // 週六 20詞 (最弱)
        const weak = Object.entries(userData.fails).sort((a,b)=>b[1]-a[1]).slice(0,20).map(x=>x[0]);
        currentWords = weak.length >= 5 ? weak : TOTAL_POOL.slice(0, 20);
        document.getElementById('task-title').innerText = "週六複習：本週難詞";
    } else { // 週日 30詞 (隨機)
        currentWords = [...TOTAL_POOL].sort(()=>0.5-Math.random()).slice(0,30);
        document.getElementById('task-title').innerText = "週日挑戰：回顧詞庫";
    }

    currentIdx = 0;
    runFlash();
    try { recognition.start(); } catch(e){}
    document.getElementById('voice-indicator').classList.add('listening');
}

function runFlash() {
    if(flashTimer) clearInterval(flashTimer);
    showWord();
    flashTimer = setInterval(() => {
        currentIdx = (currentIdx + 1) % currentWords.length;
        showWord();
    }, 1500);
}

function showWord() {
    if(currentWords.length === 0) return;
    const display = document.getElementById('word-display');
    display.innerText = currentWords[currentIdx];
    display.classList.remove('correct');
    
    const progress = ((currentWords.length === 0) ? 100 : (1 - currentWords.length/10)) * 10; // 僅示意
    document.getElementById('progress-bar').style.width = `0%`; // 這裡簡化，完成才跳
    
    speak(currentWords[currentIdx]);
}

function setupRecognition() {
    const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new sr();
    recognition.lang = 'zh-HK';
    recognition.continuous = true;
    recognition.onresult = (e) => {
        const text = e.results[e.results.length-1][0].transcript.replace(/[，。？！\s]/g, '');
        const target = currentWords[currentIdx];
        document.getElementById('status-msg').innerText = `聽：${text}`;
        
        if(text.includes(target)) {
            handleSuccess();
        } else {
            userData.fails[target] = (userData.fails[target] || 0) + 1;
            save();
        }
    };
    recognition.onend = () => { if(document.getElementById('challenge-view').style.display==='flex') recognition.start(); };
}

function handleSuccess() {
    clearInterval(flashTimer);
    document.getElementById('word-display').classList.add('correct');
    
    setTimeout(() => {
        currentWords.splice(currentIdx, 1);
        if(currentWords.length === 0) {
            finish();
        } else {
            if(currentIdx >= currentWords.length) currentIdx = 0;
            runFlash();
        }
    }, 600);
}

function finish() {
    userData.completed[window.taskingDate] = true;
    save();
    document.getElementById('word-display').innerText = "Mission Clear!";
    speak("好棒呀！任務完成！");
    setTimeout(renderCalendar, 2000);
}

function resetToday() { startTask(window.taskingDate); }
function showCalendar() { clearInterval(flashTimer); recognition.stop(); renderCalendar(); }
function speak(t) { window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(t); m.lang='zh-HK'; window.speechSynthesis.speak(m); }
function save() { localStorage.setItem('hero_daily_v1_2', JSON.stringify(userData)); }
